<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Monopoly Banker</title>

<style>
:root{
  --bg:#f2f3f7;
  --card:#fff;
  --text:#1c1c1e;
  --shadow:0 6px 18px rgba(0,0,0,0.08);
  --radius:14px;
}

*{
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

.container{padding:14px;padding-bottom:120px;}

h2,h3{margin:10px 0;}

input,select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:600;
  background:#007aff;
  color:#fff;
}

button.danger{background:#ff3b30;}

.row{display:flex;gap:10px;}
.row > *{flex:1;}

.property{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-radius:12px;
  margin-top:8px;
  color:#fff;
  font-weight:700;
}

.ledger-row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #eee;
}

.red{color:#ff3b30;}

.small{font-size:12px;opacity:0.8;}

.logBox{
  height:140px;
  overflow-y:auto;
  background:#111;
  color:#0f0;
  font-family:monospace;
  font-size:12px;
  padding:10px;
  border-radius:12px;
}

/* modal */
#backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
}

#modal{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  border-radius:18px 18px 0 0;
  padding:14px;
  transform:translateY(100%);
  transition:0.25s;
}

#modal.show{transform:translateY(0);}

</style>
</head>

<body>

<div class="container">

<!-- SETUP -->
<div id="setup">
  <h2>Monopoly Banker</h2>

  <input id="playersInput" placeholder="Players (comma separated)" />
  <input id="startCash" type="number" inputmode="numeric" value="1500"/>

  <button onclick="init()">Start Game</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <h3>Move Player</h3>
  <select id="movePlayer"></select>
  <input id="roll" type="number" inputmode="numeric" placeholder="Dice roll"/>
  <button onclick="move()">Move</button>

  <h3>Ledger</h3>
  <div id="ledger"></div>

  <h3>Log</h3>
  <div id="logBox" class="logBox"></div>

</div>
</div>

<!-- MODAL -->
<div id="backdrop" onclick="closeModal()"></div>
<div id="modal">
  <h3>Edit Property</h3>

  <input id="mName"/>
  <input id="mRent" type="number"/>
  <input id="mPass" type="number"/>

  <div class="row">
    <input id="mHouses" type="number" placeholder="Houses"/>
    <input id="mHotels" type="number" placeholder="Hotels"/>
  </div>

  <select id="activePlayer"></select>

  <button onclick="closeModal()">Close</button>
</div>

<script>

let players=[];
let balances={};
let positions={};

let properties=[];
let current=null;

const colors={
  Brown:"#8b5a2b",
  "Light Blue":"#5dade2",
  Pink:"#ff6b81",
  Orange:"#ff9f43",
  Red:"#ff3b30",
  Yellow:"#f1c40f",
  Green:"#2ecc71",
  "Dark Blue":"#1e3799",
  Special:"#7f8c8d"
};

/* INIT */
function init(){
  const names = playersInput.value.split(",").map(x=>x.trim()).filter(Boolean);
  const start = +startCash.value || 1500;

  players = names;

  players.forEach(p=>{
    balances[p]=start;
    positions[p]=0;
  });

  setup.style.display="none";
  app.style.display="block";

  render();
  log("Game started");
}

/* MOVE SYSTEM (KEY FIX: independent players, no shared rounds) */
function move(){
  const p = movePlayer.value;
  const roll = +document.getElementById("roll").value || 0;

  let pos = positions[p];
  let newPos = pos + roll;

  if(newPos >= 40){
    newPos %= 40;
    balances[p] += 200;
    log(`${p} passed GO (+$200)`);
  }

  positions[p]=newPos;

  log(`${p} moved ${roll} → ${newPos}`);
  render();
}

/* RENDER */
function render(){
  renderLedger();

  movePlayer.innerHTML = players.map(p=>`<option>${p}</option>`).join("");
}

/* LEDGER */
function renderLedger(){
  ledger.innerHTML="";

  players.forEach(p=>{
    const row=document.createElement("div");
    row.className="ledger-row";

    if(balances[p]<0) row.classList.add("red");

    row.innerHTML=`
      <div>${p} <span class="small">(Pos ${positions[p]})</span></div>
      <div>$${balances[p]}</div>
    `;

    ledger.appendChild(row);
  });
}

/* LOG */
function log(msg){
  const t = new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  logBox.innerHTML = `[${t}] ${msg}<br>` + logBox.innerHTML;
}

</script>

</body>
</html>
