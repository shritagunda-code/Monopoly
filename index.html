<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Monopoly Engine</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Arial;
  background:#f2f3f7;
  overflow-x:hidden;
}

.container{padding:14px;padding-bottom:120px}

input,select,button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
}

button{
  background:#007aff;
  color:white;
  border:none;
  font-weight:600;
}

button.danger{background:#ff3b30}

h3{margin:12px 0 6px}

.ledger-row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #eee;
}

.small{font-size:12px;opacity:0.7}

.red{color:#ff3b30}

.log{
  height:140px;
  overflow:auto;
  background:#111;
  color:#0f0;
  font-family:monospace;
  font-size:12px;
  padding:10px;
  border-radius:12px;
}

.property{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-top:8px;
  border-radius:12px;
  color:white;
  font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<div id="setup">
  <h2>Monopoly Engine</h2>
  <input id="playersInput" placeholder="Players (comma separated)"/>
  <input id="startCash" type="number" value="1500"/>
  <button onclick="init()">Start Game</button>
</div>

<div id="app" style="display:none">

<h3>Action (NO ROUNDS — PURE EVENTS)</h3>

<select id="playerSelect"></select>
<input id="roll" type="number" placeholder="Dice roll"/>
<button onclick="move()">Execute Move Event</button>

<h3>State</h3>
<div id="ledger"></div>

<h3>Properties</h3>
<div id="board"></div>

<h3>Log</h3>
<div id="log" class="log"></div>

</div>

</div>

<script>

/* =========================
   CORE STATE (EVENT-DRIVEN)
========================= */

let players=[];
let balance={};
let position={};

let properties=[];

/* fixed simple board */
const boardSize = 40;

/* sample properties mapped onto board positions */
properties = [
 {pos:1,name:"Mediterranean Ave",cost:60,rent:2,owner:null},
 {pos:3,name:"Baltic Ave",cost:60,rent:4,owner:null},
 {pos:5,name:"Reading RR",cost:200,rent:25,owner:null},
 {pos:6,name:"Oriental Ave",cost:100,rent:6,owner:null},
 {pos:8,name:"Vermont Ave",cost:100,rent:6,owner:null},
 {pos:9,name:"Connecticut Ave",cost:120,rent:8,owner:null},
 {pos:39,name:"Boardwalk",cost:400,rent:50,owner:null}
];

/* =========================
   INIT
========================= */

function init(){
  players = playersInput.value.split(",").map(x=>x.trim()).filter(Boolean);

  let start = +startCash.value || 1500;

  players.forEach(p=>{
    balance[p]=start;
    position[p]=0;
  });

  setup.style.display="none";
  app.style.display="block";

  render();
  log("Game initialized (NO ROUND SYSTEM)");
}

/* =========================
   EVENT ENGINE (CORE FIX)
========================= */

function move(){
  let p = playerSelect.value;
  let roll = +document.getElementById("roll").value || 0;

  let oldPos = position[p];
  let newPos = oldPos + roll;

  /* GO RULE */
  if(newPos >= boardSize){
    newPos %= boardSize;
    balance[p] += 200;
    log(`${p} passed GO (+$200)`);
  }

  position[p] = newPos;

  log(`${p} moved ${roll} → ${newPos}`);

  resolveLanding(p, newPos);

  render();
}

/* =========================
   LANDING LOGIC (REAL RULES)
========================= */

function resolveLanding(player, pos){

  let tile = properties.find(t=>t.pos === pos);

  if(!tile) return;

  if(tile.owner === null){
    if(confirm(`${player} landed on ${tile.name}. Buy for $${tile.cost}?`)){
      tile.owner = player;
      balance[player] -= tile.cost;
      log(`${player} bought ${tile.name}`);
    } else {
      log(`${player} declined ${tile.name}`);
    }
  }

  else if(tile.owner !== player){
    balance[player] -= tile.rent;
    balance[tile.owner] += tile.rent;
    log(`${player} paid $${tile.rent} to ${tile.owner}`);
  }
}

/* =========================
   RENDER
========================= */

function render(){

  playerSelect.innerHTML =
    players.map(p=>`<option>${p}</option>`).join("");

  ledger.innerHTML="";

  players.forEach(p=>{
    let div=document.createElement("div");
    div.className="ledger-row";

    if(balance[p]<0) div.classList.add("red");

    div.innerHTML=`
      <div>
        ${p}
        <div class="small">Pos ${position[p]}</div>
      </div>
      <div>$${balance[p]}</div>
    `;

    ledger.appendChild(div);
  });

  board.innerHTML="";

  properties.forEach(t=>{
    let div=document.createElement("div");

    div.className="property";
    div.style.background = t.owner ? "#2ecc71" : "#7f8c8d";

    div.innerHTML=`
      <div>${t.name}</div>
      <div>${t.owner || "Bank"}</div>
    `;

    board.appendChild(div);
  });
}

/* =========================
   LOG SYSTEM
========================= */

function log(msg){
  let time=new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  logBox.innerHTML=`[${time}] ${msg}<br>` + logBox.innerHTML;
}

const logBox=document.getElementById("log");

</script>

</body>
</html>
